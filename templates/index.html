<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Assistant IA</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 500px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .chat-header { background: #1a73e8; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; border-bottom: 1px solid #eee; }
        .message { margin-bottom: 15px; padding: 10px 14px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .user-message { background: #e3f2fd; color: #0d47a1; margin-left: auto; }
        .ai-message { background: #f1f3f4; color: #333; margin-right: auto; }
        .chat-input-area { display: flex; padding: 10px; background: #fff; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 1rem; }
        .chat-input-area button { background: #1a73e8; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">Mon Projet AI Studio</div>
    <div class="chat-box" id="chatBox">
        <div class="message ai-message">Bonjour ! Mon code tourne sur Termux Debian. Dis-moi quoi faire.</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Écris ton message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>
<script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const message = inputField.value.trim();
        if (!message) return;
        appendMessage(message, 'user-message');
        inputField.value = '';
        const loadingId = appendMessage("En cours...", 'ai-message');
        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            document.getElementById(loadingId).remove();
            if (data.response) { appendMessage(data.response, 'ai-message'); }
            else { appendMessage("Erreur API", 'ai-message'); }
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("Erreur de connexion", 'ai-message');
        }
    }
    function appendMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const messageDiv = document.createElement('div');
        const id = 'msg-' + Date.now();
        messageDiv.id = id; messageDiv.className = `message ${className}`; messageDiv.innerText = text;
        chatBox.appendChild(messageDiv); chatBox.scrollTop = chatBox.scrollHeight;
        return id;
    }
    function handleKeyPress(event) { if (event.key === 'Enter') { sendMessage(); } }
</script>
</body>
</html>
