services:
  - type: web
    name: databroker229-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: databroker229-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /

databases:
  - name: databroker229-db
    plan: free
