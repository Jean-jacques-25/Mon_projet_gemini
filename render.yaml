services:
  - type: web
    name: databroker229-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: databroker229-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard

databases:
  - name: databroker229-db
    plan: free
