<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataBroker229 🇧🇯 Bénin - Des données terrain fiables</title>
    <!-- Web App Manifest for PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/benin-map.png" />
    
    <!-- Leaflet.js CSS for open maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  </head>
  <body class="bg-[#121b15] text-[#f8fafc] font-sans antialiased">
    <div id="root"></div>
    
    <!-- Leaflet.js Javascript CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Register dynamic service worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").then((reg) => {
            console.log("DataBroker229 PWA Service Worker Registered!", reg.scope);
          }).catch((err) => {
            console.warn("PWA Service Worker Registration Failed:", err);
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
